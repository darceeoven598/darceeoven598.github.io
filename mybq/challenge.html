<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just a moment...</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #313131;
  }
  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 460px;
    width: 100%;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e5e5;
    border-top-color: #f38020;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 0.9s linear infinite;
  }
  .spinner.hidden {
    display: none;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 8px;
    color: #1a1a1a;
  }
  p.sub {
    font-size: 14px;
    color: #6b6b6b;
    margin: 0 0 28px;
  }
  .site-name {
    font-weight: 600;
    color: #1a1a1a;
  }
  .turnstile-container {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    min-height: 65px;
  }
  #manual-note {
    display: none;
    font-size: 13px;
    color: #6b6b6b;
    margin-top: 10px;
  }
  #error-note {
    display: none;
    font-size: 13px;
    color: #c0392b;
    margin-top: 14px;
  }
  #countdown-container {
    display: none;
    margin-top: 16px;
    font-size: 16px;
    color: #1a1a1a;
  }
  #countdown-container .countdown-number {
    font-size: 32px;
    font-weight: 700;
    color: #f38020;
    display: inline-block;
    min-width: 40px;
  }
  .success-check {
    display: none;
    font-size: 48px;
    margin-bottom: 12px;
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .verify-status {
    margin-top: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    display: none;
  }
  .verify-status.success {
    display: block;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
  }
  .verify-status.fail {
    display: block;
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ef9a9a;
  }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #9a9a9a;
  }
  footer a {
    color: #9a9a9a;
  }
  .ray-id {
    font-family: monospace;
    font-size: 11px;
    color: #b5b5b5;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="success-check" id="successCheck">✅</div>
    <h1 id="statusTitle">Checking your browser before continuing</h1>
    <p class="sub" id="statusSub">
      <span class="site-name" id="siteName">this site</span> needs to review the security of your connection before proceeding.
    </p>

    <div class="turnstile-container" id="turnstileContainer"></div>
    <div class="verify-status" id="verifyStatus"></div>

    <p id="manual-note">This should only take a few seconds.</p>
    <p id="error-note">Verification failed. Please refresh the page to try again.</p>

    <div id="countdown-container">
      Redirecting in <span class="countdown-number" id="countdownNumber">2</span> second<span id="countdownPlural">s</span>...
    </div>

    <footer>
      Performance &amp; security by Turnstile
      <div class="ray-id" id="rayId"></div>
    </footer>
  </div>
</div>

<script>
// ================================================================
//  THE REDIRECT HANDLER - This is what receives the verification
//  and handles the redirect. It does NOT rely on anything else.
// ================================================================

/**
 * handleVerificationSuccess()
 * 
 * This function is called when Turnstile verification succeeds.
 * It handles everything: showing success, countdown, and redirect.
 * 
 * It does NOT depend on any external API, Worker, or server.
 */
function handleVerificationSuccess() {
    console.log('✅ Verification successful! Starting redirect process...');
    
    // 1. Hide the spinner
    document.getElementById('spinner').classList.add('hidden');
    
    // 2. Show the success checkmark
    document.getElementById('successCheck').style.display = 'block';
    
    // 3. Update the status text
    document.getElementById('statusTitle').textContent = 'Verification successful!';
    document.getElementById('statusSub').textContent = 'You will be redirected shortly...';
    
    // 4. Hide the Turnstile widget
    document.getElementById('turnstileContainer').style.display = 'none';
    document.getElementById('manual-note').style.display = 'none';
    
    // 5. Show success status message
    var statusEl = document.getElementById('verifyStatus');
    statusEl.textContent = '✅ Verification successful!';
    statusEl.className = 'verify-status success';
    
    // 6. Start the 2-second countdown then redirect
    startCountdownAndRedirect(2);
}

/**
 * startCountdownAndRedirect(seconds)
 * 
 * Shows a countdown timer and redirects when it reaches zero.
 * This is a self-contained function that handles the entire
 * countdown and redirect process.
 */
function startCountdownAndRedirect(seconds) {
    var container = document.getElementById('countdown-container');
    var numberEl = document.getElementById('countdownNumber');
    var pluralEl = document.getElementById('countdownPlural');
    var countdown = seconds;
    var redirectUrl = 'https://www.google.com'; // <-- CHANGE THIS TO YOUR URL

    // Show the countdown container
    container.style.display = 'block';
    numberEl.textContent = countdown;
    pluralEl.textContent = countdown > 1 ? 's' : '';

    // Start the countdown interval
    var interval = setInterval(function () {
        countdown--;
        
        if (countdown <= 0) {
            // Stop the interval
            clearInterval(interval);
            
            // REDIRECT!
            console.log('🔴 Redirecting to:', redirectUrl);
            window.location.replace(redirectUrl);
            return;
        }
        
        // Update the countdown display
        numberEl.textContent = countdown;
        pluralEl.textContent = countdown > 1 ? 's' : '';
    }, 1000);
}

// ================================================================
//  TURNSTILE CALLBACK
//  This receives the verification token and calls our handler.
// ================================================================

window.onTurnstileVerified = function (token) {
    console.log('🔑 Turnstile token received:', token);
    
    if (token && token.length > 0) {
        // The token is valid - call our redirect handler
        handleVerificationSuccess();
    } else {
        // No token - show error
        console.error('❌ No token received');
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('statusTitle').textContent = 'Verification failed';
        document.getElementById('statusSub').textContent = 'Please refresh the page to try again.';
        document.getElementById('error-note').style.display = 'block';
        
        var statusEl = document.getElementById('verifyStatus');
        statusEl.textContent = '❌ No verification token received';
        statusEl.className = 'verify-status fail';
        
        if (window.turnstile) window.turnstile.reset();
    }
};

// ================================================================
//  ERROR HANDLER
// ================================================================

window.onTurnstileError = function () {
    console.error('❌ Turnstile error occurred');
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('statusTitle').textContent = 'Verification failed';
    document.getElementById('statusSub').textContent = 'Could not load the challenge. Please refresh the page.';
    document.getElementById('error-note').style.display = 'block';
    
    var statusEl = document.getElementById('verifyStatus');
    statusEl.textContent = '❌ Failed to load verification widget';
    statusEl.className = 'verify-status fail';
};

// ================================================================
//  PAGE LOAD - Render the Turnstile widget
// ================================================================

document.getElementById('siteName').textContent = window.location.hostname;
document.getElementById('rayId').textContent = 'Ray ID: ' + Array.from({ length: 16 }, function () {
    return Math.floor(Math.random() * 16).toString(16);
}).join('');

// Render Turnstile when the page loads
window.addEventListener('load', function () {
    console.log('📄 Page loaded, rendering Turnstile...');
    
    var tries = 0;
    var interval = setInterval(function () {
        tries++;
        
        if (window.turnstile) {
            clearInterval(interval);
            console.log('🎯 Rendering Turnstile...');
            
            window.turnstile.render('#turnstileContainer', {
                sitekey: '0x4AAAAAADviox3Tz8fVZXRI',
                callback: 'onTurnstileVerified',
                'error-callback': 'onTurnstileError',
                theme: 'light',
            });
            
            document.getElementById('manual-note').style.display = 'block';
            console.log('✅ Turnstile rendered successfully');
            
        } else if (tries > 40) {
            clearInterval(interval);
            console.error('❌ Turnstile script failed to load');
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('statusTitle').textContent = 'Verification unavailable';
            document.getElementById('statusSub').textContent = 'The security check could not be loaded. Please refresh the page.';
            document.getElementById('error-note').style.display = 'block';
        }
    }, 100);
});

// Also try to render immediately if Turnstile is already loaded
if (window.turnstile) {
    console.log('🎯 Turnstile already loaded, rendering immediately');
    window.turnstile.render('#turnstileContainer', {
        sitekey: '0x4AAAAAADviox3Tz8fVZXRI',
        callback: 'onTurnstileVerified',
        'error-callback': 'onTurnstileError',
        theme: 'light',
    });
    document.getElementById('manual-note').style.display = 'block';
}
</script>

</body>
</html>
