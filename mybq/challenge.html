<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just a moment...</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #313131;
  }
  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 460px;
    width: 100%;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e5e5;
    border-top-color: #f38020;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 0.9s linear infinite;
  }
  .spinner.hidden {
    display: none;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 8px;
    color: #1a1a1a;
  }
  p.sub {
    font-size: 14px;
    color: #6b6b6b;
    margin: 0 0 28px;
  }
  .site-name {
    font-weight: 600;
    color: #1a1a1a;
  }
  .checkbox-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 20px;
    background: #f8f9fa;
    border: 2px solid #d0d0d0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 16px;
    min-height: 65px;
  }
  .checkbox-container:hover {
    background: #f0f0f0;
  }
  .checkbox-container.checked {
    border-color: #34a853;
    background: #e8f5e9;
  }
  .checkbox-container input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #34a853;
    cursor: pointer;
    flex-shrink: 0;
  }
  .checkbox-container label {
    font-size: 15px;
    color: #1a1a1a;
    cursor: pointer;
    user-select: none;
  }
  #manual-note {
    font-size: 13px;
    color: #6b6b6b;
    margin-top: 4px;
  }
  #error-note {
    display: none;
    font-size: 13px;
    color: #c0392b;
    margin-top: 14px;
  }
  #countdown-container {
    display: none;
    margin-top: 16px;
    font-size: 16px;
    color: #1a1a1a;
  }
  #countdown-container .countdown-number {
    font-size: 32px;
    font-weight: 700;
    color: #f38020;
    display: inline-block;
    min-width: 40px;
  }
  .success-check {
    display: none;
    font-size: 48px;
    margin-bottom: 12px;
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .verify-status {
    margin-top: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    display: none;
  }
  .verify-status.success {
    display: block;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
  }
  .verify-status.fail {
    display: block;
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ef9a9a;
  }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #9a9a9a;
  }
  footer a {
    color: #9a9a9a;
  }
  .ray-id {
    font-family: monospace;
    font-size: 11px;
    color: #b5b5b5;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="success-check" id="successCheck">✅</div>
    <h1 id="statusTitle">Checking your browser before continuing</h1>
    <p class="sub" id="statusSub">
      <span class="site-name" id="siteName">this site</span> needs to review the security of your connection before proceeding.
    </p>

    <!-- SIMPLE CHECKBOX - This is the verification -->
    <div class="checkbox-container" id="checkboxContainer">
      <input type="checkbox" id="verifyCheckbox">
      <label for="verifyCheckbox">I am not a robot</label>
    </div>

    <div class="verify-status" id="verifyStatus"></div>

    <p id="manual-note">Check the box to verify you are human.</p>
    <p id="error-note">Verification failed. Please refresh the page to try again.</p>

    <div id="countdown-container">
      Redirecting in <span class="countdown-number" id="countdownNumber">2</span> second<span id="countdownPlural">s</span>...
    </div>

    <footer>
      Performance &amp; security by Turnstile
      <div class="ray-id" id="rayId"></div>
    </footer>
  </div>
</div>

<script>
// ================================================================
//  SIMPLE VERIFICATION + REDIRECT
//  This ALWAYS works - no external dependencies
// ================================================================

// ========== CONFIGURATION ==========
var REDIRECT_URL = 'https://www.google.com'; // <-- CHANGE THIS
var COUNTDOWN_SECONDS = 2;
// ===================================

var checkbox = document.getElementById('verifyCheckbox');
var container = document.getElementById('checkboxContainer');

// Set site name
document.getElementById('siteName').textContent = window.location.hostname;

// Generate fake Ray ID
document.getElementById('rayId').textContent = 'Ray ID: ' + Array.from({ length: 16 }, function() {
    return Math.floor(Math.random() * 16).toString(16);
}).join('');

// ========== CHECKBOX HANDLER ==========
checkbox.addEventListener('change', function() {
    if (this.checked) {
        // ✅ Verification successful!
        console.log('✅ Verification successful!');
        
        // Hide spinner
        document.getElementById('spinner').classList.add('hidden');
        
        // Show success checkmark
        document.getElementById('successCheck').style.display = 'block';
        
        // Update status text
        document.getElementById('statusTitle').textContent = 'Verification successful!';
        document.getElementById('statusSub').textContent = 'You will be redirected shortly...';
        
        // Update checkbox container
        container.classList.add('checked');
        
        // Show success status
        var statusEl = document.getElementById('verifyStatus');
        statusEl.textContent = '✅ Verification successful!';
        statusEl.className = 'verify-status success';
        
        // Hide the note
        document.getElementById('manual-note').style.display = 'none';
        
        // Start countdown then redirect
        startCountdownAndRedirect(COUNTDOWN_SECONDS);
        
    } else {
        // Unchecked
        container.classList.remove('checked');
        document.getElementById('statusTitle').textContent = 'Checking your browser before continuing';
        document.getElementById('statusSub').textContent = 'Please verify that you are human.';
        document.getElementById('successCheck').style.display = 'none';
        document.getElementById('spinner').classList.remove('hidden');
        document.getElementById('verifyStatus').className = 'verify-status';
        document.getElementById('verifyStatus').textContent = '';
        document.getElementById('manual-note').style.display = 'block';
        document.getElementById('countdown-container').style.display = 'none';
    }
});

/**
 * startCountdownAndRedirect(seconds)
 * Shows countdown and redirects when it reaches zero
 */
function startCountdownAndRedirect(seconds) {
    var container = document.getElementById('countdown-container');
    var numberEl = document.getElementById('countdownNumber');
    var pluralEl = document.getElementById('countdownPlural');
    var countdown = seconds;

    container.style.display = 'block';
    numberEl.textContent = countdown;
    pluralEl.textContent = countdown > 1 ? 's' : '';

    var interval = setInterval(function () {
        countdown--;
        
        if (countdown <= 0) {
            clearInterval(interval);
            console.log('🔴 Redirecting to:', REDIRECT_URL);
            window.location.replace(REDIRECT_URL);
            return;
        }
        
        numberEl.textContent = countdown;
        pluralEl.textContent = countdown > 1 ? 's' : '';
    }, 1000);
}

// ========== CLICK ON CONTAINER TOGGLES CHECKBOX ==========
container.addEventListener('click', function(e) {
    // Don't trigger if clicking directly on the checkbox
    if (e.target.tagName !== 'INPUT') {
        checkbox.checked = !checkbox.checked;
        checkbox.dispatchEvent(new Event('change'));
    }
});

console.log('📄 Page ready. Check the box to verify and redirect.');
</script>

</body>
</html>
