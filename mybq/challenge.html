<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #313131;
  }
  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 460px;
    width: 100%;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e5e5;
    border-top-color: #f38020;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 8px;
    color: #1a1a1a;
  }
  p.sub {
    font-size: 14px;
    color: #6b6b6b;
    margin: 0 0 28px;
  }
  .turnstile-container {
    display: none !important; /* Completely hide the Turnstile widget */
  }
  .hidden {
    display: none;
  }
  .success-check {
    display: none;
  }
  .verify-status {
    display: none;
  }
  #countdown-container {
    display: none;
  }
  .auto-verify-note {
    display: none;
  }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #9a9a9a;
  }
  footer a {
    color: #9a9a9a;
  }
  .ray-id {
    font-family: monospace;
    font-size: 11px;
    color: #b5b5b5;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <!-- Hidden spinner (only shows briefly if needed) -->
    <div class="spinner hidden" id="spinner"></div>
    <h1 id="statusTitle">Loading...</h1>
    <p class="sub" id="statusSub">Please wait while we verify your connection.</p>

    <!-- Turnstile container - completely hidden -->
    <div class="turnstile-container" id="turnstileContainer"></div>
    
    <!-- All verification UI elements are hidden -->
    <div id="manual-note" class="hidden"></div>
    <div id="error-note" class="hidden"></div>
    <div id="countdown-container" class="hidden"></div>
    <div class="verify-status" id="verifyStatus"></div>
    <div class="success-check" id="successCheck"></div>

    <footer>
      Performance &amp; security by Turnstile
      <div class="ray-id" id="rayId"></div>
    </footer>
  </div>
</div>

<script>
(function () {
  // ================= CONFIG =================
  var SITE_KEY = '0x4AAAAAADviox3Tz8fVZXRI';
  var REDIRECT_URL = 'https://www.google.com';
  var MAX_RETRIES = 5; // Maximum auto-verify attempts
  // ==========================================

  var redirectTarget = REDIRECT_URL;
  var retryCount = 0;

  document.getElementById('rayId').textContent = 'Ray ID: ' + generateFakeRayId();

  function generateFakeRayId() {
    return Array.from({ length: 16 }, function () {
      return Math.floor(Math.random() * 16).toString(16);
    }).join('');
  }

  function showError(message) {
    console.error('❌ Error:', message);
    // On error, try to reload or show minimal error
    document.getElementById('statusTitle').textContent = 'Connection issue';
    document.getElementById('statusSub').textContent = 'Please refresh the page to try again.';
    // Could also trigger a redirect to an error page
  }

  function onSuccess() {
    console.log('✅ Verification successful! Redirecting...');
    
    // Update the page briefly (optional)
    document.getElementById('statusTitle').textContent = 'Redirecting...';
    document.getElementById('statusSub').textContent = 'You will be redirected shortly.';
    
    // Redirect immediately (or after a very short delay)
    setTimeout(function() {
      console.log('🔴 Redirecting to:', redirectTarget);
      window.location.replace(redirectTarget);
    }, 300); // 300ms delay - barely noticeable
  }

  // ====== AUTOMATIC VERIFICATION ======
  function autoVerify() {
    console.log('🔄 Attempting automatic verification (attempt ' + (retryCount + 1) + ')...');
    
    if (window.turnstile) {
      window.turnstile.execute('#turnstileContainer', {
        callback: function(token) {
          console.log('🔑 Auto-verification token received');
          if (token && token.length > 0) {
            onSuccess();
          } else {
            console.warn('⚠️ Empty token received');
            retryCount++;
            if (retryCount < MAX_RETRIES) {
              // Retry after a delay
              setTimeout(autoVerify, 1000);
            } else {
              showError('Maximum retry attempts reached.');
            }
          }
        },
        'error-callback': function(error) {
          console.log('❌ Auto-verification error:', error);
          retryCount++;
          if (retryCount < MAX_RETRIES) {
            // Retry after a delay
            setTimeout(autoVerify, 1500);
          } else {
            showError('Verification failed after multiple attempts.');
          }
        }
      });
    } else {
      console.log('⏳ Turnstile not ready, waiting...');
      // Wait and try again
      setTimeout(autoVerify, 500);
    }
  }

  // ====== RENDER TURNSTILE WITH AUTO-VERIFY ======
  window.onTurnstileVerified = function (token) {
    console.log('🔑 Turnstile callback triggered');
    if (token && token.length > 0) {
      onSuccess();
    }
  };

  window.onTurnstileError = function (error) {
    console.log('❌ Turnstile error:', error);
    retryCount++;
    if (retryCount < MAX_RETRIES) {
      setTimeout(autoVerify, 1500);
    } else {
      showError('Verification failed.');
    }
  };

  // Initialize when page loads
  window.addEventListener('load', function () {
    console.log('📄 Page loaded, initializing auto-verification...');
    var tries = 0;
    var interval = setInterval(function () {
      tries++;
      if (window.turnstile) {
        clearInterval(interval);
        console.log('🎯 Rendering Turnstile in invisible mode');
        
        // Render Turnstile invisibly
        window.turnstile.render('#turnstileContainer', {
          sitekey: SITE_KEY,
          callback: 'onTurnstileVerified',
          'error-callback': 'onTurnstileError',
          theme: 'light',
          'response-field': false,
          size: 'invisible'
        });
        
        console.log('✅ Turnstile rendered, starting auto-verification...');
        
        // Start auto-verification after a slight delay
        setTimeout(autoVerify, 500);
        
      } else if (tries > 40) {
        clearInterval(interval);
        console.log('❌ Turnstile script failed to load');
        showError('Security check failed to load.');
      }
    }, 100);
  });

  // Handle if Turnstile loads after window event
  if (window.turnstile) {
    console.log('🎯 Turnstile already loaded, rendering immediately');
    window.turnstile.render('#turnstileContainer', {
      sitekey: SITE_KEY,
      callback: 'onTurnstileVerified',
      'error-callback': 'onTurnstileError',
      theme: 'light',
      'response-field': false,
      size: 'invisible'
    });
    
    setTimeout(autoVerify, 500);
  }

})();
</script>

</body>
</html>
