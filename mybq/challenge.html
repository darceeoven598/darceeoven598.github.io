<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification Required</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #313131;
  }
  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 460px;
    width: 100%;
    padding: 40px 32px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    border: 1px solid #e8e8e8;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 8px;
    color: #1a1a1a;
  }
  p.sub {
    font-size: 14px;
    color: #6b6b6b;
    margin: 0 0 24px;
    line-height: 1.5;
  }
  .checkbox-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 16px 0 24px;
    padding: 12px 16px;
    background: #f8f9fa;
    border-radius: 8px;
    border: 2px solid #e0e0e0;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .checkbox-container.checked {
    border-color: #34a853;
    background: #e8f5e9;
  }
  .checkbox-container input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #34a853;
    cursor: pointer;
  }
  .checkbox-container label {
    font-size: 15px;
    color: #1a1a1a;
    cursor: pointer;
    user-select: none;
  }
  .btn-redirect {
    width: 100%;
    padding: 14px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0.5;
    pointer-events: none;
  }
  .btn-redirect.active {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-redirect.active:hover {
    background: #1557b0;
    transform: translateY(-1px);
  }
  .btn-redirect.active:active {
    transform: scale(0.98);
  }
  .countdown-text {
    margin-top: 12px;
    font-size: 14px;
    color: #6b6b6b;
    display: none;
  }
  .countdown-text .number {
    font-size: 24px;
    font-weight: 700;
    color: #1a73e8;
  }
  .ray-id {
    font-family: monospace;
    font-size: 11px;
    color: #b5b5b5;
    margin-top: 16px;
  }
  .status-badge {
    display: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .status-badge.success {
    display: inline-block;
    background: #e8f5e9;
    color: #2e7d32;
  }
  .status-badge.waiting {
    display: inline-block;
    background: #fff3e0;
    color: #e65100;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <span class="icon">🛡️</span>
    <h1 id="statusTitle">Verification Required</h1>
    <p class="sub" id="statusSub">
      Please verify that you are human before continuing to <strong id="siteName">this site</strong>.
    </p>

    <div class="status-badge waiting" id="statusBadge">⏳ Waiting for verification</div>

    <div class="checkbox-container" id="checkboxContainer">
      <input type="checkbox" id="verifyCheckbox">
      <label for="verifyCheckbox">I am not a robot</label>
    </div>

    <button class="btn-redirect" id="redirectBtn">Continue to Google</button>

    <div class="countdown-text" id="countdownText">
      Redirecting in <span class="number" id="countdownNumber">3</span> seconds...
    </div>

    <div class="ray-id" id="rayId">Ray ID: verifying...</div>
  </div>
</div>

<script>
// ================================================================
//  SIMPLE VERIFICATION + REDIRECT
//  This uses a checkbox that, when checked, enables the redirect.
//  It DOES NOT rely on Turnstile or any external service.
// ================================================================

(function() {
  'use strict';

  // ========== CONFIGURATION ==========
  var REDIRECT_URL = 'https://www.google.com';
  var COUNTDOWN_SECONDS = 3;
  // ===================================

  var checkbox = document.getElementById('verifyCheckbox');
  var container = document.getElementById('checkboxContainer');
  var btn = document.getElementById('redirectBtn');
  var countdownText = document.getElementById('countdownText');
  var countdownNumber = document.getElementById('countdownNumber');
  var statusBadge = document.getElementById('statusBadge');
  var siteName = document.getElementById('siteName');

  // Set site name
  siteName.textContent = window.location.hostname;

  // Generate fake Ray ID
  document.getElementById('rayId').textContent = 'Ray ID: ' + Array.from({ length: 16 }, function() {
    return Math.floor(Math.random() * 16).toString(16);
  }).join('');

  // ========== CHECKBOX HANDLER ==========
  checkbox.addEventListener('change', function() {
    if (this.checked) {
      // ✅ Verification successful!
      console.log('✅ Verification successful!');
      
      // Update UI
      container.classList.add('checked');
      btn.classList.add('active');
      btn.textContent = '✓ Verified — Continue to Google';
      statusBadge.className = 'status-badge success';
      statusBadge.textContent = '✅ Verification successful!';
      document.getElementById('statusTitle').textContent = 'Verification Complete';
      document.getElementById('statusSub').textContent = 'You are verified. Redirecting shortly...';
      
      // Start countdown
      startCountdown();
      
    } else {
      // Unchecked
      container.classList.remove('checked');
      btn.classList.remove('active');
      btn.textContent = 'Continue to Google';
      statusBadge.className = 'status-badge waiting';
      statusBadge.textContent = '⏳ Please verify that you are human';
      countdownText.style.display = 'none';
      document.getElementById('statusTitle').textContent = 'Verification Required';
      document.getElementById('statusSub').textContent = 'Please verify that you are human before continuing.';
    }
  });

  // ========== COUNTDOWN + REDIRECT ==========
  function startCountdown() {
    var remaining = COUNTDOWN_SECONDS;
    countdownText.style.display = 'block';
    countdownNumber.textContent = remaining;

    var interval = setInterval(function() {
      remaining--;
      
      if (remaining <= 0) {
        clearInterval(interval);
        countdownText.textContent = 'Redirecting now...';
        console.log('🔴 Redirecting to:', REDIRECT_URL);
        
        // REDIRECT!
        window.location.replace(REDIRECT_URL);
        return;
      }
      
      countdownNumber.textContent = remaining;
    }, 1000);
  }

  // ========== CLICK ON CONTAINER TOGGLES CHECKBOX ==========
  container.addEventListener('click', function(e) {
    // Don't trigger if clicking directly on the checkbox
    if (e.target.tagName !== 'INPUT') {
      checkbox.checked = !checkbox.checked;
      checkbox.dispatchEvent(new Event('change'));
    }
  });

  // ========== BUTTON CLICK (fallback) ==========
  btn.addEventListener('click', function() {
    if (this.classList.contains('active')) {
      // If already verified, redirect immediately
      console.log('🔴 Manual redirect triggered');
      window.location.replace(REDIRECT_URL);
    } else {
      // If not verified, check the box
      checkbox.checked = true;
      checkbox.dispatchEvent(new Event('change'));
    }
  });

  console.log('📄 Page loaded. Check the box to verify and redirect.');
})();
</script>

</body>
</html>
