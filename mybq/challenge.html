<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just a moment...</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #313131;
  }
  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 460px;
    width: 100%;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e5e5;
    border-top-color: #f38020;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 0.9s linear infinite;
  }
  .spinner.hidden {
    display: none;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 8px;
    color: #1a1a1a;
  }
  p.sub {
    font-size: 14px;
    color: #6b6b6b;
    margin: 0 0 28px;
  }
  .site-name {
    font-weight: 600;
    color: #1a1a1a;
  }
  .turnstile-container {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    min-height: 65px;
    /* Ensure the widget stays centered and normal size */
    align-items: center;
  }
  .turnstile-container iframe {
    /* Force normal sizing */
    width: auto !important;
    height: auto !important;
    max-width: 300px !important;
  }
  #manual-note {
    display: none;
    font-size: 13px;
    color: #6b6b6b;
    margin-top: 10px;
  }
  #error-note {
    display: none;
    font-size: 13px;
    color: #c0392b;
    margin-top: 14px;
  }
  #countdown-container {
    display: none;
    margin-top: 16px;
    font-size: 16px;
    color: #1a1a1a;
  }
  #countdown-container .countdown-number {
    font-size: 32px;
    font-weight: 700;
    color: #f38020;
    display: inline-block;
    min-width: 40px;
  }
  .success-check {
    display: none;
    font-size: 48px;
    margin-bottom: 12px;
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #9a9a9a;
  }
  footer a {
    color: #9a9a9a;
  }
  .ray-id {
    font-family: monospace;
    font-size: 11px;
    color: #b5b5b5;
    margin-top: 6px;
  }
  .verify-status {
    margin-top: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    display: none;
  }
  .verify-status.success {
    display: block;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
  }
  .verify-status.fail {
    display: block;
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ef9a9a;
  }

  /* Fix for Turnstile when in challenge mode */
  .cf-turnstile {
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    min-height: 65px !important;
    width: auto !important;
  }
  .cf-turnstile iframe {
    width: auto !important;
    height: auto !important;
  }
  /* Prevent Turnstile from resizing container */
  .cf-turnstile .cf-turnstile-wrapper {
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="success-check" id="successCheck">✅</div>
    <h1 id="statusTitle">Checking your browser before continuing</h1>
    <p class="sub" id="statusSub">
      <span class="site-name" id="siteName">this site</span> needs to review the security of your connection before proceeding.
    </p>

    <div class="turnstile-container" id="turnstileContainer"></div>
    <div class="verify-status" id="verifyStatus"></div>

    <p id="manual-note">This should only take a few seconds.</p>
    <p id="error-note">Verification failed. Please refresh the page to try again.</p>

    <div id="countdown-container">
      Redirecting in <span class="countdown-number" id="countdownNumber">2</span> second<span id="countdownPlural">s</span>...
    </div>

    <footer>
      Performance &amp; security by Turnstile
      <div class="ray-id" id="rayId"></div>
    </footer>
  </div>
</div>

<script>
(function () {
  // ================= CONFIG =================
  var SITE_KEY = '0x4AAAAAADviox3Tz8fVZXRI';
  var REDIRECT_URL = 'https://www.google.com';
  // ==========================================

  var redirectTarget = REDIRECT_URL;
  var isVerified = false;
  var autoVerifyAttempted = false;

  document.getElementById('siteName').textContent = window.location.hostname;
  document.getElementById('rayId').textContent = 'Ray ID: ' + generateFakeRayId();

  function generateFakeRayId() {
    return Array.from({ length: 16 }, function () {
      return Math.floor(Math.random() * 16).toString(16);
    }).join('');
  }

  function showStatus(message, type) {
    var statusEl = document.getElementById('verifyStatus');
    statusEl.textContent = message;
    statusEl.className = 'verify-status ' + type;
  }

  function showError(message) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('statusTitle').textContent = 'Verification failed';
    document.getElementById('statusSub').textContent = message || 'Please refresh the page to try again.';
    document.getElementById('error-note').style.display = 'block';
    showStatus('❌ ' + (message || 'Verification failed'), 'fail');
  }

  function startCountdown(seconds) {
    var container = document.getElementById('countdown-container');
    var numberEl = document.getElementById('countdownNumber');
    var pluralEl = document.getElementById('countdownPlural');
    var countdown = seconds;

    container.style.display = 'block';
    numberEl.textContent = countdown;
    pluralEl.textContent = countdown > 1 ? 's' : '';

    var interval = setInterval(function () {
      countdown--;
      if (countdown <= 0) {
        clearInterval(interval);
        console.log('🔴 Redirecting to:', redirectTarget);
        window.location.replace(redirectTarget);
        return;
      }
      numberEl.textContent = countdown;
      pluralEl.textContent = countdown > 1 ? 's' : '';
    }, 1000);
  }

  function onSuccess() {
    if (isVerified) return;
    isVerified = true;
    
    console.log('✅ Verification successful! Redirecting...');
    
    document.getElementById('spinner').classList.add('hidden');
    document.getElementById('successCheck').style.display = 'block';
    document.getElementById('statusTitle').textContent = 'Verification successful!';
    document.getElementById('statusSub').textContent = 'You will be redirected shortly...';
    document.getElementById('turnstileContainer').style.display = 'none';
    document.getElementById('manual-note').style.display = 'none';
    showStatus('✅ Verification successful!', 'success');

    startCountdown(2);
  }

  // ====== AUTO-VERIFY FUNCTION ======
  function autoVerify() {
    if (isVerified || autoVerifyAttempted) return;
    autoVerifyAttempted = true;
    
    console.log('🔄 Attempting automatic verification...');
    
    if (window.turnstile) {
      // Don't show the "Verifying automatically" text, keep it looking normal
      // Just silently execute
      window.turnstile.execute('#turnstileContainer', {
        callback: function(token) {
          console.log('🔑 Auto-verification token received:', token);
          if (token && token.length > 0) {
            onSuccess();
          } else {
            console.warn('⚠️ Empty token received, retrying...');
            autoVerifyAttempted = false;
            setTimeout(autoVerify, 2000);
          }
        },
        'error-callback': function(error) {
          console.log('❌ Auto-verification error:', error);
          autoVerifyAttempted = false;
          setTimeout(autoVerify, 3000);
        }
      });
      
      // Don't change the manual note text to keep it looking normal
      // document.getElementById('manual-note').textContent = 'This should only take a few seconds.';
      document.getElementById('manual-note').style.display = 'block';
      
    } else {
      console.log('⏳ Turnstile not ready, waiting...');
      autoVerifyAttempted = false;
      setTimeout(autoVerify, 500);
    }
  }

  // ====== TURNSTILE CALLBACKS ======
  window.onTurnstileVerified = function (token) {
    console.log('🔑 Turnstile token received:', token);
    
    if (token && token.length > 0 && !isVerified) {
      onSuccess();
    } else if (!isVerified) {
      showError('Invalid token received.');
      if (window.turnstile) window.turnstile.reset();
    }
  };

  window.onTurnstileError = function () {
    console.log('❌ Turnstile error');
    if (!isVerified) {
      showError('Could not load the challenge widget.');
    }
  };

  // Explicitly render once the Turnstile API script is ready
  window.addEventListener('load', function () {
    console.log('📄 Page loaded, checking for Turnstile...');
    var tries = 0;
    var interval = setInterval(function () {
      tries++;
      if (window.turnstile) {
        clearInterval(interval);
        console.log('🎯 Rendering Turnstile with key:', SITE_KEY);
        
        // Render with normal settings - no invisible or compact
        window.turnstile.render('#turnstileContainer', {
          sitekey: SITE_KEY,
          callback: 'onTurnstileVerified',
          'error-callback': 'onTurnstileError',
          theme: 'light',
          // Use the default size (not invisible, not compact)
          size: 'normal'
        });
        
        document.getElementById('manual-note').textContent = 'This should only take a few seconds.';
        document.getElementById('manual-note').style.display = 'block';
        console.log('✅ Turnstile rendered successfully');
        
        // Auto-verify after a short delay (2 seconds to let widget load fully)
        setTimeout(autoVerify, 2000);
        
      } else if (tries > 40) {
        clearInterval(interval);
        console.log('❌ Turnstile script failed to load after 4 seconds');
        showError('The challenge script failed to load.');
      }
    }, 100);
  });

  // Also try to render if Turnstile loads after the window event
  if (window.turnstile) {
    console.log('🎯 Turnstile already loaded, rendering immediately');
    window.turnstile.render('#turnstileContainer', {
      sitekey: SITE_KEY,
      callback: 'onTurnstileVerified',
      'error-callback': 'onTurnstileError',
      theme: 'light',
      size: 'normal'
    });
    
    document.getElementById('manual-note').textContent = 'This should only take a few seconds.';
    document.getElementById('manual-note').style.display = 'block';
    
    // Auto-verify after a short delay
    setTimeout(autoVerify, 2000);
  }
})();
</script>

</body>
</html>
