<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just a moment...</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #313131;
  }
  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 460px;
    width: 100%;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e5e5;
    border-top-color: #f38020;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 8px;
    color: #1a1a1a;
  }
  p.sub {
    font-size: 14px;
    color: #6b6b6b;
    margin: 0 0 28px;
  }
  .site-name {
    font-weight: 600;
    color: #1a1a1a;
  }
  .turnstile-container {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    min-height: 65px;
  }
  #manual-note {
    display: none;
    font-size: 13px;
    color: #6b6b6b;
    margin-top: 10px;
  }
  #error-note {
    display: none;
    font-size: 13px;
    color: #c0392b;
    margin-top: 14px;
  }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #9a9a9a;
  }
  footer a {
    color: #9a9a9a;
  }
  .ray-id {
    font-family: monospace;
    font-size: 11px;
    color: #b5b5b5;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="statusTitle">Checking your browser before continuing</h1>
    <p class="sub" id="statusSub">
      <span class="site-name" id="siteName">this site</span> needs to review the security of your connection before proceeding.
    </p>

    <div class="turnstile-container" id="turnstileContainer"></div>

    <p id="manual-note">This should only take a few seconds.</p>
    <p id="error-note">Verification failed. Please refresh the page to try again.</p>

    <footer>
      Performance &amp; security by Turnstile
      <div class="ray-id" id="rayId"></div>
    </footer>
  </div>
</div>

<script>
(function () {
  // ================= CONFIG - edit these two lines only =================
  var SITE_KEY = '0x4AAAAAADviox3Tz8fVZXRI';
  var WORKER_URL = 'https://hcaptcha-verify.kamitassin.workers.dev';
  // =========================================================================

  var VERIFY_ENDPOINT = WORKER_URL + '/__verify';
  var params = new URLSearchParams(window.location.search);
  var redirectTarget = params.get('redirect') || 'index.html';

  document.getElementById('siteName').textContent = window.location.hostname;
  document.getElementById('rayId').textContent = 'Ray ID: ' + generateFakeRayId();

  function generateFakeRayId() {
    return Array.from({ length: 16 }, function () {
      return Math.floor(Math.random() * 16).toString(16);
    }).join('');
  }

  function showError(message) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('statusTitle').textContent = 'Verification failed';
    document.getElementById('statusSub').textContent = message || 'Please refresh the page to try again.';
    document.getElementById('error-note').style.display = 'block';
  }

  function onSuccess() {
    document.getElementById('statusTitle').textContent = 'Success! Redirecting...';
    document.getElementById('statusSub').textContent = 'You may now continue to ' + window.location.hostname + '.';
  }

  // Called by Turnstile once the visitor completes/passes the challenge
  window.onTurnstileVerified = async function (token) {
    try {
      var res = await fetch(VERIFY_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include', // required so the Worker's cross-site cookie is stored/sent
        body: JSON.stringify({ token: token }),
      });

      console.log('[__verify] status:', res.status);

      var data;
      try {
        data = await res.json();
      } catch (parseErr) {
        console.error('[__verify] response was not valid JSON - likely a CORS block or wrong WORKER_URL', parseErr);
        showError('Could not reach verification server. Check console for details.');
        return;
      }

      console.log('[__verify] response body:', data);

      if (res.ok && data.success) {
        onSuccess();
        window.location.replace(redirectTarget);
      } else {
        showError(data.message);
        if (window.turnstile) window.turnstile.reset();
      }
    } catch (err) {
      console.error('[__verify] fetch failed entirely - check Network tab for CORS or DNS errors:', err);
      showError('Network error while verifying.');
      if (window.turnstile) window.turnstile.reset();
    }
  };

  window.onTurnstileError = function () {
    showError('Could not load the challenge widget.');
  };

  // Explicitly render once the Turnstile API script is ready
  window.addEventListener('load', function () {
    var tries = 0;
    var interval = setInterval(function () {
      tries++;
      if (window.turnstile) {
        clearInterval(interval);
        window.turnstile.render('#turnstileContainer', {
          sitekey: SITE_KEY,
          callback: 'onTurnstileVerified',
          'error-callback': 'onTurnstileError',
          theme: 'light',
        });
        document.getElementById('manual-note').style.display = 'block';
      } else if (tries > 40) {
        clearInterval(interval);
        showError('The challenge script failed to load.');
      }
    }, 100);
  });
})();
</script>

</body>
</html>
