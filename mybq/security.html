<!DOCTYPE html>
<html>
<head>
  <title>Security Check</title>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body>

<form id="myForm">

  <!-- 1. hCaptcha widget (FRONTEND) -->
  <div class="h-captcha" data-sitekey="65202544-8c28-474a-826c-36767ba24914"></div>

  <button type="submit">Continue</button>

</form>

<!-- 2. JavaScript (still FRONTEND, same file) -->
<script>
document.getElementById("myForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const token = document.querySelector('[name="h-captcha-response"]').value;

  const res = await fetch("https://hcaptcha-verify.kamitassin.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token })
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = "index.html";
  } else {
    alert("Verification failed");
  }
});
</script>

</body>
</html>
