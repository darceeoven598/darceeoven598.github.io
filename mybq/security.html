<!DOCTYPE html>
<html>
<head>
  <title>Security Check</title>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body style="text-align:center; font-family:Arial; padding-top:100px;">

<h2>Verify you are human</h2>

<form id="myForm">

  <div class="cf-turnstile"
       data-sitekey="0x4AAAAAADviox3Tz8fVZXRI">
  </div>

  <button type="submit">Continue</button>

</form>

<script>
document.getElementById("myForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  // ✅ reliable way to get Turnstile token
  const token = turnstile.getResponse();

  if (!token) {
    alert("Please complete the captcha first");
    return;
  }

  try {
    const res = await fetch("https://hcaptcha-verify.kamitassin.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (data.success) {
      window.location.href = "index.html";
    } else {
      alert("Verification failed");
    }

  } catch (err) {
    alert("Server error. Try again.");
    console.error(err);
  }
});
</script>

</body>
</html>
